name: Clear workflow run history

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        type: choice
        description: 'Workflow name to clean'
        required: true
        default: 'Build_Lenovo_sm8750'
        options:
          - "Build_Lenovo_sm8750"
      count:
        description: 'Maximum number of runs to delete'
        required: false
        default: '20'
      delete_failed:
        description: 'Delete failed runs?'
        required: false
        type: boolean
        default: true
      delete_success:
        description: 'Delete successful runs?'
        required: false
        type: boolean
        default: false
      delete_cancelled:
        description: 'Delete cancelled runs?'
        required: false
        type: boolean
        default: true
      reverse_order:
        description: 'Clean from oldest to newest?'
        required: false
        type: boolean
        default: true

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install GitHub CLI and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Clean target workflow and this workflow run history
        env:
          REPO: ${{ github.repository }}
          COUNT: ${{ inputs.count }}
          DELETE_FAILED: ${{ inputs.delete_failed }}
          DELETE_SUCCESS: ${{ inputs.delete_success }}
          DELETE_CANCELLED: ${{ inputs.delete_cancelled }}
          REVERSE_ORDER: ${{ inputs.reverse_order }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -e

          echo "Current repository: $REPO"
          echo "Looking up the ID of workflow \"$WORKFLOW_NAME\"..."
          WORKFLOW_ID=$(gh api repos/$REPO/actions/workflows | jq -r ".workflows[] | select(.name == \"$WORKFLOW_NAME\") | .id")
          if [ -z "$WORKFLOW_ID" ]; then
            echo "Workflow \"$WORKFLOW_NAME\" not found. Exiting."
            exit 1
          fi


          echo "Fetching all run history page by page..."
          PER_PAGE=100
          PAGE=1
          MATCHED_RUNS="[]"
          while true; do
            RESP=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=$PER_PAGE&page=$PAGE")
            RUNS=$(echo "$RESP" | jq '.workflow_runs')
            COUNT_THIS_PAGE=$(echo "$RUNS" | jq 'length')

            if [ "$COUNT_THIS_PAGE" -eq 0 ]; then
              break
            fi

            MATCHED_RUNS=$(jq -s 'add' <(echo "$MATCHED_RUNS") <(echo "$RUNS"))
            PAGE=$((PAGE + 1))
          done

          echo "Fetched $(echo "$MATCHED_RUNS" | jq 'length') runs in total."

          # Sort order: oldest to newest or newest to oldest
          if [[ "$REVERSE_ORDER" == "true" ]]; then
            SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at)')
          else
            SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at) | reverse')
          fi

          # Keep only the first N entries
          TO_DELETE_RUNS=$(echo "$SORTED_RUNS" | jq ".[0:${COUNT}]")

          echo "$TO_DELETE_RUNS" | jq -c '.[]' | while read run; do
            ID=$(echo "$run" | jq -r '.id')
            STATUS=$(echo "$run" | jq -r '.conclusion')
            STATE=$(echo "$run" | jq -r '.status')

            if [[ "$STATE" == "in_progress" || "$STATE" == "queued" ]]; then
              echo "Skipping run ID: $ID (state: $STATE)"
              continue
            fi

            if [[ "$STATUS" == "failure" && "$DELETE_FAILED" != "true" ]]; then continue; fi
            if [[ "$STATUS" == "success" && "$DELETE_SUCCESS" != "true" ]]; then continue; fi
            if [[ "$STATUS" == "cancelled" && "$DELETE_CANCELLED" != "true" ]]; then continue; fi

            echo "Deleting run ID: $ID (status: $STATUS)"
            gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "Delete failed"
          done

          echo "Cleaning this workflow run history..."
          SELF_WORKFLOW_ID=$(gh api repos/$REPO/actions/workflows | jq -r '.workflows[] | select(.name == "Clear workflow run history") | .id')
          if [ -n "$SELF_WORKFLOW_ID" ]; then
            SELF_RUNS=$(gh api "repos/$REPO/actions/workflows/$SELF_WORKFLOW_ID/runs?per_page=50" | jq -c '.workflow_runs[]')

            echo "$SELF_RUNS" | while read run; do
              ID=$(echo "$run" | jq -r '.id')
              if [[ "$ID" == "$CURRENT_RUN_ID" ]]; then
                echo "Skipping current run ID: $ID"
                continue
              fi
              echo "Deleting this workflow run ID: $ID"
              gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "Delete failed"
            done
          fi
